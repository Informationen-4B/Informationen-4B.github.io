<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Termine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <h2>Termine</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <div class="card">
    <h3>Termin hinzufügen</h3>
    <input id="title" placeholder="Titel">
    <input id="date" type="date">
    <select id="type">
      <option>HÜ</option>
      <option>Test</option>
      <option>SA</option>
      <option>Mitarbeit</option>
    </select>
    <button onclick="addEvent()">Speichern</button>
  </div>

  <div class="card">
    <h3>Alle Termine</h3>
    <ul id="list"></ul>
  </div>
</div>

<p id="error"></p>

<script type="module" src="firebase.js"></script>
<script type="module" src="dashboard.js"></script>
</body>
</html>
