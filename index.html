<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informationen-4B</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;

  /* 🔥 WICHTIG: SCROLL FIX */
  height: auto;
  min-height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
}

body {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 70px auto;
}

header {
  grid-column: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: linear-gradient(90deg, #4f46e5, #3b82f6);
  color: white;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

.sidebar {
  background: #1e293b;
  color: white;
  padding: 15px;
}

.sidebar div {
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 6px;
  background: #334155;
}

.main {
  padding: 15px;
}

.days {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.day {
  min-width: 80px;
  background: #e0e7ff;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.form {
  margin-top: 20px;
}

input, select, button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
  cursor: pointer;
}

/* 📱 MOBILE FIX */
@media (max-width: 700px) {
  body {
    grid-template-columns: 1fr;
    grid-template-rows: 60px auto auto;
  }

  .sidebar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
  }

  .main {
    padding: 10px;
  }
}
</style>
</head>
<body>

<header>
  <h1>Informationen-4B</h1>
  <button onclick="logout()">Abmelden</button>
</header>

<div class="sidebar" id="subjects"></div>

<div class="main">
  <div class="days" id="days"></div>

  <div class="form">
    <input type="text" id="title" placeholder="Titel">
    <select id="subject"></select>
    <select id="type">
      <option>HÜ</option>
      <option>SA</option>
      <option>Test</option>
    </select>
    <input type="date" id="date">
    <button onclick="addEntry()">Termin hinzufügen</button>
  </div>
</div>

<script>
const subjects = [
  "Mathe","Deutsch","Englisch","Geschichte","Geographie",
  "Religion","Physik","Physik Labor","Chemie","Chemie Labor",
  "Biologie","Grafisches Zeichnen","Digitale Grundbildung",
  "Italienisch","Sport","Kunst"
];

const subjectDiv = document.getElementById("subjects");
const subjectSelect = document.getElementById("subject");

subjects.forEach(s => {
  let d = document.createElement("div");
  d.innerText = s;
  subjectDiv.appendChild(d);

  let o = document.createElement("option");
  o.text = s;
  subjectSelect.add(o);
});

// 14 Tage
const daysDiv = document.getElementById("days");
for (let i = 0; i < 14; i++) {
  let d = new Date();
  d.setDate(d.getDate() + i);

  let el = document.createElement("div");
  el.className = "day";
  el.innerText = d.toLocaleDateString();

  daysDiv.appendChild(el);
}

function addEntry() {
  alert("Termin gespeichert (Demo)");
}

function logout() {
  alert("Logout");
}
</script>

</body>
</html>
