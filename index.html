<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Informationen-4B</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 60px auto;
  min-height: 100vh;
  overflow-y: auto;
}

/* HEADER */
header {
  grid-column: 1 / 3;
  background: #3b82f6;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
}

.user {
  font-size: 14px;
}

/* SIDEBAR */
.sidebar {
  background: #1e293b;
  color: white;
  padding: 10px;
}

.subject {
  padding: 10px;
  margin-bottom: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.subject:hover {
  background: #334155;
}

/* CONTENT */
.content {
  padding: 20px;
}

/* 14 TAGE */
.days {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 20px;
}

.day {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 8px;
  min-width: 80px;
  text-align: center;
}

/* CARDS */
.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* FORM */
.form {
  margin-top: 20px;
  max-width: 400px;
}

input, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

button {
  padding: 10px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* LOGIN */
.auth {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.auth-box {
  width:300px;
}
</style>
</head>

<body>

<header>
  <h2>Informationen-4B</h2>
  <div class="user" id="userInfo"></div>
</header>

<div class="sidebar" id="subjects"></div>

<div class="content">
  <div class="days" id="days"></div>
  <div id="events"></div>

  <div class="form" id="adminPanel" style="display:none;">
    <h3>Termin hinzufügen</h3>
    <input id="title" placeholder="Titel">
    <input id="date" type="date">
    <select id="subjectSelect"></select>
    <select id="type">
      <option>HÜ</option>
      <option>Test</option>
      <option>SA</option>
    </select>
    <button onclick="addEvent()">Speichern</button>
  </div>
</div>

<!-- LOGIN -->
<div class="auth" id="auth">
  <div class="auth-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>

    <h3>Registrieren</h3>
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Passwort">
    <input id="regPass2" type="password" placeholder="Passwort wiederholen">
    <button onclick="register()">Registrieren</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBPlpoODRfMwrU8Nxk4TTFPvUNMX8igvo",
  authDomain: "informationen-4b-dc655.firebaseapp.com",
  databaseURL: "https://informationen-4b-dc655-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "informationen-4b-dc655",
  storageBucket: "informationen-4b-dc655.firebasestorage.app",
  messagingSenderId: "523568445266",
  appId: "1:523568445266:web:f38bc3a96adc3180f26c8b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* FÄCHER */
const subjects = [
"Mathe","Deutsch","Englisch","Geschichte","Geographie",
"Religion","Physik","Physik Labor","Chemie","Chemie Labor",
"Biologie","Grafisches Zeichnen","Digitale Grundbildung",
"Italienisch","Sport"
];

/* UI SETUP */
subjects.forEach(s=>{
  let div=document.createElement("div");
  div.className="subject";
  div.innerText=s;
  document.getElementById("subjects").appendChild(div);

  let opt=document.createElement("option");
  opt.innerText=s;
  document.getElementById("subjectSelect").appendChild(opt);
});

/* 14 TAGE */
for(let i=0;i<14;i++){
  let d=new Date();
  d.setDate(d.getDate()+i);

  let div=document.createElement("div");
  div.className="day";
  div.innerText=d.toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit"});
  document.getElementById("days").appendChild(div);
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("userInfo").innerText=user.email;

    // ADMIN FREIGABE (du bist admin)
    if(user.email === "Matthias.HANDL@ahsbruck.at"){
      document.getElementById("adminPanel").style.display="block";
    }

    loadEvents();
  }
});

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  );
}

/* REGISTER */
function register(){
  if(regPass.value !== regPass2.value){
    alert("Passwort falsch!");
    return;
  }

  auth.createUserWithEmailAndPassword(
    regEmail.value,
    regPass.value
  );
}

/* EVENTS */
function addEvent(){
  let data={
    title:title.value,
    date:date.value,
    subject:subjectSelect.value,
    type:type.value
  };

  db.ref("events").push(data);
}

/* LOAD */
function loadEvents(){
  db.ref("events").on("value",snap=>{
    events.innerHTML="";
    snap.forEach(e=>{
      let ev=e.val();

      let div=document.createElement("div");
      div.className="card";
      div.innerText=`${ev.date} | ${ev.subject} | ${ev.type} | ${ev.title}`;

      events.appendChild(div);
    });
  });
}
</script>

</body>
</html>
