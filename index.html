<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4B Schulplaner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8fafc;--surface:#ffffff;--surface-alt:#f8fbff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--sidebar:#1e293b;--sidebar-line:#334155;--sidebar-text:#e2e8f0;--sidebar-muted:#94a3b8;--blue:#3b82f6;--blue-strong:#2563eb;--red:#ef4444;--yellow:#f59e0b;--green:#10b981;--indigo:#6366f1;--shadow:0 4px 10px rgba(0,0,0,.05);--shadow-soft:0 12px 28px rgba(15,23,42,.08);--r1:16px;--r2:12px;--r3:8px}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{font-family:"IBM Plex Sans",sans-serif;background:linear-gradient(180deg,#f8fafc 0%,#eef4fb 100%);color:var(--text)}
    h1,h2,h3{margin:0;font-family:"Bricolage Grotesque",sans-serif;line-height:1.05}
    p{margin:0;line-height:1.55}
    .hidden{display:none!important}

    .screen{min-height:100vh;padding:32px}
    .card,.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);box-shadow:var(--shadow);color:var(--text)}

    .loading-screen{display:grid;place-items:center}
    .loading-card{width:min(420px,100%);padding:32px;text-align:center}
    .spinner{width:46px;height:46px;margin:0 auto 16px;border-radius:50%;border:4px solid #dbeafe;border-top-color:var(--blue);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .auth-screen{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(360px,.95fr);gap:24px;align-items:stretch}
    .auth-hero,.auth-card{padding:32px}
    .auth-hero{display:flex;flex-direction:column;justify-content:space-between;gap:28px;background:linear-gradient(145deg,#ffffff,#eff6ff)}
    .auth-hero h1{font-size:clamp(2.2rem,4vw,4rem);max-width:12ch}
    .eyebrow,.pill,.day-count,.type-badge,.status-badge{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:.82rem;font-weight:700;line-height:1}
    .eyebrow{background:#dbeafe;color:#1d4ed8}
    .pill{background:#f8fafc;border:1px solid var(--line);color:var(--text)}
    .day-count{background:#dbeafe;color:#1d4ed8}
    .subject-cloud{display:flex;flex-wrap:wrap;gap:10px}
    .subject-chip{padding:8px 12px;border-radius:999px;background:#ffffff;border:1px solid var(--line);font-size:.9rem}
    .auth-card{display:flex;flex-direction:column;justify-content:center;gap:16px}
    .switch-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:6px;border-radius:12px;background:#eff6ff;border:1px solid #dbeafe}

    button,input,select,textarea{font:inherit}
    button{padding:10px 14px;border-radius:8px;background:var(--blue);color:#fff;border:none;cursor:pointer;transition:background .2s ease,transform .2s ease}
    button:hover:not(:disabled){background:var(--blue-strong);transform:translateY(-1px)}
    button:disabled{cursor:wait;opacity:.65;transform:none}
    .switch-btn{background:transparent;color:var(--muted);padding:12px 14px;border-radius:8px}
    .switch-btn:hover:not(:disabled){background:rgba(255,255,255,.65);color:var(--text)}
    .switch-btn.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}

    .notice{padding:14px 16px;border-radius:12px;border:1px solid transparent;font-size:.95rem}
    .notice.error{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    .notice.success{background:#dcfce7;border-color:#bbf7d0;color:#166534}
    .notice.info{background:#dbeafe;border-color:#bfdbfe;color:#1d4ed8}

    form{display:grid;gap:14px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .field{display:grid;gap:6px}
    .field label{font-size:.92rem;font-weight:700}
    input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:var(--text);outline:none;transition:border-color .18s ease,box-shadow .18s ease}
    input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
    textarea{min-height:120px;resize:vertical}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border-radius:8px;background:var(--blue);color:#fff;font-weight:700}
    .btn.secondary{background:#e2e8f0;color:var(--text)}
    .btn.ghost{background:#ffffff;color:var(--text);border:1px solid var(--line)}
    .btn.light{background:#0f172a;color:#e2e8f0;border:1px solid #334155}
    .btn.danger{background:var(--red)}
    .btn.small{padding:9px 12px;font-size:.9rem}
    .btn.secondary:hover:not(:disabled){background:#cbd5e1;color:var(--text)}
    .btn.ghost:hover:not(:disabled){background:#f8fafc;color:var(--text)}
    .btn.light:hover:not(:disabled){background:#020617;color:#e2e8f0}
    .btn.danger:hover:not(:disabled){background:#dc2626}

    .main-screen{display:grid;grid-template-columns:240px 1fr;grid-template-rows:70px 1fr;height:100vh;max-width:none;margin:0;padding:0;overflow:hidden;background:var(--bg)}
    .topbar{grid-column:1 / -1;grid-row:1;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:0 24px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 8px rgba(15,23,42,.04);position:sticky;top:0;z-index:30}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .mark{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:#dbeafe;color:#1d4ed8;font-family:"Bricolage Grotesque",sans-serif;font-weight:800;flex:0 0 auto}
    .topbar-copy h2{font-size:1.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-actions{display:flex;align-items:center;gap:12px;flex:0 0 auto}

    .sidebar{grid-column:1;grid-row:2;background:var(--sidebar);color:var(--sidebar-text);border:none;border-right:1px solid #0f172a;border-radius:0;box-shadow:none;padding:18px 14px;height:calc(100vh - 70px);overflow:auto}
    .sidebar .profile-chip{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:#0f172a;border:1px solid #334155;margin-bottom:18px}
    .sidebar .avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#3b82f6;color:#fff;font-weight:800;flex:0 0 auto}
    .sidebar .profile-copy{display:grid;gap:2px;min-width:0}
    .sidebar .profile-copy strong{color:#f8fafc}
    .sidebar .profile-copy span{color:var(--sidebar-muted);font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sidebar .panel-head h2{font-size:1.2rem;color:#f8fafc}
    .sidebar .btn.light{width:100%;justify-content:center;margin-bottom:14px}
    .sidebar .btn.light:hover:not(:disabled){background:#1e293b}
    .subject-list{display:grid;gap:6px}
    .subject-item{width:100%;padding:12px;border-radius:8px;cursor:pointer;background:transparent;color:var(--sidebar-text);border:none;box-shadow:none;text-align:left;display:grid;gap:8px}
    .subject-item:hover:not(:disabled){background:#334155;color:#fff;transform:none}
    .subject-item.active{background:#3b82f6;color:#fff}
    .subject-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .subject-head strong{font-size:.96rem;color:inherit}
    .sidebar .term-meta{display:flex;flex-wrap:wrap;gap:6px}

    .content-shell{grid-column:2;grid-row:2;overflow:auto;padding:24px}
    .trend-panel{padding:18px}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .day-bar{display:flex;gap:10px;overflow-x:auto;padding-top:14px;padding-bottom:4px}
    .day-card{min-width:92px;padding:12px 14px;border-radius:12px;background:#fff;border:1px solid #cbd5e1;color:var(--text);text-align:left;display:grid;gap:6px;box-shadow:none}
    .day-card:hover:not(:disabled){background:#eff6ff;color:var(--text);transform:none}
    .day-card.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
    .day-card.active .day-count{background:rgba(255,255,255,.18);color:#fff}
    .day-card.has-terms{border-color:#93c5fd}
    .day-card small{font-weight:700;opacity:.82}

    .workspace{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:24px;align-items:start;margin-top:24px}
    .content-panel,.form-panel,.admin-panel{padding:18px}
    .content-panel{min-width:0}
    .content-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
    .content-header h2{font-size:1.9rem}
    .content-header p{color:var(--muted)}
    .side-panel{display:grid;gap:18px;align-self:start}
    .term-list,.user-list{display:grid;gap:10px}
    .term-meta,.form-actions,.user-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .term-card,.user-card{background:#ffffff;border-radius:12px;padding:16px;margin-bottom:0;box-shadow:0 4px 10px rgba(0,0,0,0.05);border:1px solid var(--line);display:grid;gap:12px}
    .term-top,.user-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .term-title,.user-title{display:grid;gap:8px}

    .type-badge,.status-badge{padding:3px 8px;border-radius:8px;font-size:12px}
    .type-hu{background:#10b981;color:#fff}
    .type-sa{background:#ef4444;color:#fff}
    .type-test{background:#f59e0b;color:#fff}
    .type-mu{background:#6366f1;color:#fff}
    .empty-state{padding:18px;border-radius:12px;background:#fff;border:1px dashed #cbd5e1;color:var(--muted)}

    .toast-wrap{position:fixed;right:16px;bottom:16px;z-index:60;display:grid;gap:10px;width:min(320px,calc(100vw - 32px))}
    .toast{padding:14px 16px;border-radius:12px;color:#fff;box-shadow:0 18px 36px rgba(0,0,0,.16)}
    .toast.info{background:#2563eb}.toast.success{background:#16a34a}.toast.error{background:#dc2626}

    @media (max-width:1180px){
      .workspace{grid-template-columns:1fr}
      .side-panel{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:980px){
      .auth-screen{grid-template-columns:1fr}
      .main-screen{grid-template-columns:1fr;grid-template-rows:70px auto auto}
      .sidebar{grid-column:1;grid-row:2;height:auto;border-right:none;border-bottom:1px solid #0f172a}
      .content-shell{grid-column:1;grid-row:3;padding:16px}
      .side-panel{grid-template-columns:1fr}
    }
    @media (max-width:720px){
      .screen{padding:16px}
      .form-grid{grid-template-columns:1fr}
      .topbar{padding:0 16px}
      .brand{min-width:0}
      .topbar-copy h2{font-size:1.25rem}
      .content-header h2{font-size:1.55rem}
    }
  </style>
</head>
<body>
  <section id="loadingScreen" class="screen loading-screen">
    <div class="card loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <h2>Schulplaner wird geladen</h2>
      <p>Firebase wird verbunden und dein Zugriff wird geprüft.</p>
    </div>
  </section>

  <section id="authScreen" class="screen auth-screen hidden">
    <div class="card auth-hero">
      <div class="eyebrow">4B Klasse</div>
      <div>
        <h1>7 Tage, alle Fächer, alles auf einen Blick.</h1>
      </div>
      <div id="subjectCloud" class="subject-cloud"></div>
    </div>

    <div class="card auth-card">
      <div>
        <h2>Login oder Registrierung</h2>
      </div>
      <div class="switch-row">
        <button id="showLoginBtn" class="switch-btn active" type="button">Login</button>
        <button id="showRegisterBtn" class="switch-btn" type="button">Registrieren</button>
      </div>
      <div id="authNotice" class="notice hidden" aria-live="polite"></div>
      <form id="loginForm" novalidate>
        <div class="field"><label for="loginEmail">E-Mail</label><input id="loginEmail" type="email" autocomplete="email" required></div>
        <div class="field"><label for="loginPassword">Passwort</label><input id="loginPassword" type="password" autocomplete="current-password" required></div>
        <button id="loginSubmitBtn" class="btn" type="submit">Einloggen</button>
      </form>
      <form id="registerForm" class="hidden" novalidate>
        <div class="form-grid">
          <div class="field"><label for="registerName">Name</label><input id="registerName" type="text" autocomplete="name" required></div>
          <div class="field"><label for="registerEmail">E-Mail</label><input id="registerEmail" type="email" autocomplete="email" required></div>
        </div>
        <div class="form-grid">
          <div class="field"><label for="registerPassword">Passwort</label><input id="registerPassword" type="password" autocomplete="new-password" required></div>
          <div class="field"><label for="registerPasswordConfirm">Passwort bestätigen</label><input id="registerPasswordConfirm" type="password" autocomplete="new-password" required></div>
        </div>
        <button id="registerSubmitBtn" class="btn" type="submit">Konto erstellen</button>
      </form>
    </div>
  </section>

  <main id="mainScreen" class="main-screen hidden">
    <header class="topbar">
      <div class="brand">
        <div class="mark">4B</div>
        <div class="topbar-copy">
          <h2>Schulplaner</h2>
        </div>
      </div>
      <div class="header-actions">
        <button id="logoutBtn" class="btn ghost" type="button">Abmelden</button>
      </div>
    </header>

    <aside class="panel sidebar">
      <div class="profile-chip">
        <div id="profileAvatar" class="avatar">4B</div>
        <div class="profile-copy">
          <strong id="profileName">Gast</strong>
          <span id="profileEmail">-</span>
        </div>
      </div>
      <div class="panel-head">
        <h2>Fächer</h2>
      </div>
      <button id="showAllSubjectsBtn" class="btn light small" type="button">Heute anzeigen</button>
      <div id="subjectList" class="subject-list"></div>
    </aside>

    <section class="content-shell">
      <section class="panel trend-panel">
        <div class="panel-head">
          <h2>7-Tage-Ansicht</h2>
          <button id="resetFilterBtn" class="btn ghost small" type="button">Heute</button>
        </div>
        <div id="dayBar" class="day-bar"></div>
      </section>

      <div class="workspace">
        <section class="panel content-panel">
          <div class="content-header">
            <div>
              <h2 id="contentTitle">Heute</h2>
              <p id="contentMeta"></p>
            </div>
            <button id="jumpToFormBtn" class="btn secondary small hidden" type="button">Termin hinzufügen</button>
          </div>
          <div id="termList" class="term-list"></div>
        </section>

        <aside class="side-panel">
          <section id="termFormPanel" class="panel form-panel hidden">
            <h2 id="termFormTitle">Termin hinzufügen</h2>
            <form id="termForm" novalidate>
              <div class="field"><label for="termSubject">Fach</label><select id="termSubject" required></select></div>
              <div class="field"><label for="termType">Typ</label><select id="termType" required></select></div>
              <div class="field"><label for="termDate">Datum</label><input id="termDate" type="date" required></div>
              <div class="field"><label for="termDescription">Beschreibung</label><textarea id="termDescription" required></textarea></div>
              <div class="field"><label for="termPeople">Personen</label><input id="termPeople" type="text" placeholder="Optional"></div>
              <div class="form-actions">
                <button id="saveTermBtn" class="btn" type="submit">Termin speichern</button>
                <button id="cancelEditBtn" class="btn secondary hidden" type="button">Bearbeitung abbrechen</button>
              </div>
            </form>
          </section>

          <section id="adminPanel" class="panel admin-panel hidden">
            <h2>Adminbereich</h2>
            <div id="userList" class="user-list"></div>
          </section>
        </aside>
      </div>
    </section>
  </main>

  <div id="toastWrap" class="toast-wrap" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, set, update, remove, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBPlpoODRfMwrU8Nxk4TTFPvUNMX8igvo",
      authDomain: "informationen-4b-dc655.firebaseapp.com",
      databaseURL: "https://informationen-4b-dc655-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "informationen-4b-dc655",
      storageBucket: "informationen-4b-dc655.firebasestorage.app",
      messagingSenderId: "523568445266",
      appId: "1:523568445266:web:f38bc3a96adc3180f26c8b"
    };

    const ADMIN_EMAIL = "matthias.handl@ahsbruck.at";
    const TERM_TYPES = ["Test", "SA", "H\u00DC", "M\u00DC"];
    const SUBJECTS = [
      ["mathe", "Mathe"], ["deutsch", "Deutsch"], ["englisch", "Englisch"], ["geschichte", "Geschichte"],
      ["geographie", "Geographie"], ["religion", "Religion"], ["physik", "Physik"], ["physik_labor", "Physik Labor"],
      ["chemie", "Chemie"], ["chemie_labor", "Chemie Labor"], ["biologie", "Biologie"], ["grafisches_zeichnen", "Grafisches Zeichnen"],
      ["digitale_grundbildung", "Digitale Grundbildung"], ["italienisch", "Italienisch"], ["sport", "Sport"]
    ].map(([key, label]) => ({ key, label }));
    const ROLE_LABELS = { user: "User", sprecher: "Sprecher", admin: "Admin" };
    const EDITOR_ROLES = new Set(["admin", "sprecher"]);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const elements = {
      loadingScreen: document.getElementById("loadingScreen"),
      authScreen: document.getElementById("authScreen"),
      mainScreen: document.getElementById("mainScreen"),
      subjectCloud: document.getElementById("subjectCloud"),
      showLoginBtn: document.getElementById("showLoginBtn"),
      showRegisterBtn: document.getElementById("showRegisterBtn"),
      loginForm: document.getElementById("loginForm"),
      registerForm: document.getElementById("registerForm"),
      authNotice: document.getElementById("authNotice"),
      loginEmail: document.getElementById("loginEmail"),
      loginPassword: document.getElementById("loginPassword"),
      loginSubmitBtn: document.getElementById("loginSubmitBtn"),
      registerName: document.getElementById("registerName"),
      registerEmail: document.getElementById("registerEmail"),
      registerPassword: document.getElementById("registerPassword"),
      registerPasswordConfirm: document.getElementById("registerPasswordConfirm"),
      registerSubmitBtn: document.getElementById("registerSubmitBtn"),
      profileAvatar: document.getElementById("profileAvatar"),
      profileName: document.getElementById("profileName"),
      profileEmail: document.getElementById("profileEmail"),
      logoutBtn: document.getElementById("logoutBtn"),
      resetFilterBtn: document.getElementById("resetFilterBtn"),
      dayBar: document.getElementById("dayBar"),
      showAllSubjectsBtn: document.getElementById("showAllSubjectsBtn"),
      subjectList: document.getElementById("subjectList"),
      contentTitle: document.getElementById("contentTitle"),
      contentMeta: document.getElementById("contentMeta"),
      jumpToFormBtn: document.getElementById("jumpToFormBtn"),
      termList: document.getElementById("termList"),
      termFormPanel: document.getElementById("termFormPanel"),
      termFormTitle: document.getElementById("termFormTitle"),
      termForm: document.getElementById("termForm"),
      termSubject: document.getElementById("termSubject"),
      termType: document.getElementById("termType"),
      termDate: document.getElementById("termDate"),
      termDescription: document.getElementById("termDescription"),
      termPeople: document.getElementById("termPeople"),
      saveTermBtn: document.getElementById("saveTermBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      adminPanel: document.getElementById("adminPanel"),
      userList: document.getElementById("userList"),
      toastWrap: document.getElementById("toastWrap")
    };

    const state = {
      authView: "login",
      authNotice: null,
      currentUser: null,
      currentProfile: null,
      terms: [],
      users: {},
      filterMode: "day",
      selectedDay: todayValue(),
      selectedSubjectKey: null,
      editingTerm: null,
      pendingProfileCreation: false,
      registrationFlow: false,
      unsubProfile: null,
      unsubTerms: null,
      unsubUsers: null
    };

    function todayValue() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function subjectByKey(key) {
      return SUBJECTS.find((subject) => subject.key === key) || null;
    }

    function roleLabel(role) {
      return ROLE_LABELS[role] || "User";
    }

    function typeClass(type) {
      return {
        "H\u00DC": "type-hu",
        "SA": "type-sa",
        "Test": "type-test",
        "M\u00DC": "type-mu"
      }[type] || "";
    }

    function isAdminEmail(email) {
      return String(email || "").trim().toLowerCase() === ADMIN_EMAIL;
    }

    function canManageTerms() {
      return Boolean(state.currentProfile && EDITOR_ROLES.has(state.currentProfile.role));
    }

    function isAdmin() {
      return Boolean(state.currentProfile && state.currentProfile.role === "admin");
    }

    function getInitials(name) {
      return (name || "4B").split(" ").filter(Boolean).slice(0, 2).map((part) => part[0].toUpperCase()).join("") || "4B";
    }

    function formatDate(dateString) {
      if (!dateString) return "Kein Datum";
      const date = new Date(dateString + "T12:00:00");
      if (Number.isNaN(date.getTime())) return dateString;
      return new Intl.DateTimeFormat("de-AT", { day: "2-digit", month: "2-digit", year: "numeric" }).format(date);
    }

    function formatDayLabel(dateString) {
      const date = new Date(dateString + "T12:00:00");
      const weekday = new Intl.DateTimeFormat("de-AT", { weekday: "short" }).format(date).replace(".", "");
      const day = new Intl.DateTimeFormat("de-AT", { day: "2-digit" }).format(date);
      return weekday.charAt(0).toUpperCase() + weekday.slice(1) + " " + day;
    }

    function nextSevenDays() {
      return Array.from({ length: 7 }, (_, index) => {
        const base = new Date(todayValue() + "T12:00:00");
        base.setDate(base.getDate() + index);
        const local = new Date(base.getTime() - base.getTimezoneOffset() * 60000);
        const date = local.toISOString().slice(0, 10);
        return {
          date,
          label: formatDayLabel(date),
          terms: state.terms.filter((term) => term.datum === date)
        };
      });
    }

    function normalizeTerms(raw) {
      const terms = [];
      SUBJECTS.forEach((subject) => {
        const bucket = raw && raw[subject.key] ? Object.entries(raw[subject.key]) : [];
        bucket.forEach(([id, value]) => {
          terms.push({
            id,
            subjectKey: subject.key,
            fach: subject.label,
            typ: value.typ || "",
            datum: value.datum || "",
            beschreibung: value.beschreibung || "",
            personen: value.personen || ""
          });
        });
      });
      return terms.sort((a, b) => (a.datum || "9999-12-31").localeCompare(b.datum || "9999-12-31") || a.fach.localeCompare(b.fach, "de"));
    }

    function visibleTerms() {
      if (state.filterMode === "subject" && state.selectedSubjectKey) {
        return state.terms.filter((term) => term.subjectKey === state.selectedSubjectKey);
      }
      return state.terms.filter((term) => term.datum === state.selectedDay);
    }

    function trendTermsForSubject(subjectKey) {
      const dates = new Set(nextSevenDays().map((day) => day.date));
      return state.terms.filter((term) => term.subjectKey === subjectKey && dates.has(term.datum));
    }

    function setScreen(name) {
      elements.loadingScreen.classList.toggle("hidden", name !== "loading");
      elements.authScreen.classList.toggle("hidden", name !== "auth");
      elements.mainScreen.classList.toggle("hidden", name !== "main");
    }

    function switchAuthView(view) {
      state.authView = view;
      elements.showLoginBtn.classList.toggle("active", view === "login");
      elements.showRegisterBtn.classList.toggle("active", view === "register");
      elements.loginForm.classList.toggle("hidden", view !== "login");
      elements.registerForm.classList.toggle("hidden", view !== "register");
      renderAuthNotice();
    }

    function setAuthNotice(message, type = "info", view = state.authView) {
      state.authNotice = { message, type, view };
      renderAuthNotice();
    }

    function clearAuthNotice() {
      state.authNotice = null;
      renderAuthNotice();
    }

    function renderAuthNotice() {
      const visible = Boolean(state.authNotice && state.authNotice.view === state.authView);
      elements.authNotice.className = "notice" + (visible ? " " + state.authNotice.type : " hidden");
      elements.authNotice.textContent = visible ? state.authNotice.message : "";
    }

    function toast(message, type = "info") {
      const node = document.createElement("div");
      node.className = "toast " + type;
      node.textContent = message;
      elements.toastWrap.appendChild(node);
      window.setTimeout(() => node.remove(), 3600);
    }

    function setBusy(button, busy, label) {
      if (busy) {
        button.dataset.originalLabel = button.textContent;
        button.textContent = label;
      } else if (button.dataset.originalLabel) {
        button.textContent = button.dataset.originalLabel;
      }
      button.disabled = busy;
    }

    function cleanupSubscriptions() {
      if (state.unsubProfile) { state.unsubProfile(); state.unsubProfile = null; }
      if (state.unsubTerms) { state.unsubTerms(); state.unsubTerms = null; }
      if (state.unsubUsers) { state.unsubUsers(); state.unsubUsers = null; }
    }

    function readableAuthError(error) {
      const code = error?.code || "";
      return {
        "auth/email-already-in-use": "Diese E-Mail ist bereits registriert.",
        "auth/invalid-email": "Bitte gib eine gültige E-Mail-Adresse ein.",
        "auth/weak-password": "Das Passwort ist zu schwach. Verwende mindestens 6 Zeichen.",
        "auth/invalid-credential": "E-Mail oder Passwort sind nicht korrekt.",
        "auth/user-not-found": "Dieses Konto wurde nicht gefunden.",
        "auth/wrong-password": "Das Passwort ist falsch.",
        "auth/too-many-requests": "Zu viele Versuche. Bitte warte kurz und probiere es erneut.",
        "auth/network-request-failed": "Netzwerkfehler. Bitte prüfe deine Verbindung."
      }[code] || "Es ist ein Fehler aufgetreten. Bitte versuche es erneut.";
    }

    function readableDbError(error) {
      const message = error?.message || "";
      if (message.includes("permission_denied")) return "Firebase hat den Zugriff abgelehnt. Bitte prüfe die Realtime-Database-Regeln.";
      return "Die Daten konnten nicht gespeichert oder geladen werden.";
    }

    function createTypeBadge(type) {
      const badge = document.createElement("span");
      badge.className = "type-badge " + typeClass(type);
      badge.textContent = type;
      return badge;
    }

    function populateStaticUI() {
      elements.subjectCloud.innerHTML = "";
      elements.termSubject.innerHTML = "";
      elements.termType.innerHTML = "";

      SUBJECTS.forEach((subject) => {
        const chip = document.createElement("span");
        chip.className = "subject-chip";
        chip.textContent = subject.label;
        elements.subjectCloud.appendChild(chip);

        const option = document.createElement("option");
        option.value = subject.key;
        option.textContent = subject.label;
        elements.termSubject.appendChild(option);
      });

      TERM_TYPES.forEach((type) => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        elements.termType.appendChild(option);
      });

      elements.termDate.value = todayValue();
    }

    function renderHeader() {
      if (!state.currentProfile) return;
      elements.profileAvatar.textContent = getInitials(state.currentProfile.name);
      elements.profileName.textContent = state.currentProfile.name;
      elements.profileEmail.textContent = state.currentProfile.email;
    }

    function renderDayBar() {
      elements.dayBar.innerHTML = "";
      nextSevenDays().forEach((day) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day-card" + (state.filterMode === "day" && state.selectedDay === day.date ? " active" : "") + (day.terms.length ? " has-terms" : "");
        button.dataset.day = day.date;

        const small = document.createElement("small");
        small.textContent = day.date === todayValue() ? "Heute" : "Tag";
        const strong = document.createElement("strong");
        strong.textContent = day.label;
        button.append(small, strong);

        if (day.terms.length) {
          const count = document.createElement("span");
          count.className = "day-count";
          count.textContent = day.terms.length + " Termin(e)";
          button.appendChild(count);
        }

        elements.dayBar.appendChild(button);
      });
    }

    function renderSubjectList() {
      elements.subjectList.innerHTML = "";
      elements.showAllSubjectsBtn.className = state.filterMode === "day" ? "btn small" : "btn light small";

      SUBJECTS.forEach((subject) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "subject-item" + (state.filterMode === "subject" && state.selectedSubjectKey === subject.key ? " active" : "");
        button.dataset.subjectKey = subject.key;

        const header = document.createElement("div");
        header.className = "subject-head";

        const title = document.createElement("strong");
        title.textContent = subject.label;
        header.appendChild(title);

        const badges = document.createElement("div");
        badges.className = "term-meta";
        [...new Set(trendTermsForSubject(subject.key).map((term) => term.typ))].forEach((type) => badges.appendChild(createTypeBadge(type)));
        header.appendChild(badges);

        button.appendChild(header);
        elements.subjectList.appendChild(button);
      });
    }

    function renderContentHeader() {
      if (state.filterMode === "subject" && state.selectedSubjectKey) {
        const subject = subjectByKey(state.selectedSubjectKey);
        const count = visibleTerms().length;
        elements.contentTitle.textContent = subject ? subject.label : "Fach";
        elements.contentMeta.textContent = count ? count + " Termin(e) für dieses Fach." : "Noch keine Termine für dieses Fach.";
      } else {
        const count = visibleTerms().length;
        elements.contentTitle.textContent = formatDayLabel(state.selectedDay);
        elements.contentMeta.textContent = count ? count + " Termin(e) an diesem Tag." : "Noch keine Termine an diesem Tag.";
      }
    }

    function createTermCard(term) {
      const card = document.createElement("article");
      card.className = "term-card";

      const top = document.createElement("div");
      top.className = "term-top";

      const titleWrap = document.createElement("div");
      titleWrap.className = "term-title";
      const title = document.createElement("h3");
      title.textContent = term.beschreibung;

      const meta = document.createElement("div");
      meta.className = "term-meta";

      const subject = document.createElement("span");
      subject.className = "pill";
      subject.textContent = term.fach;
      meta.appendChild(subject);
      meta.appendChild(createTypeBadge(term.typ));

      const date = document.createElement("span");
      date.className = "pill";
      date.textContent = formatDate(term.datum);
      meta.appendChild(date);

      if (term.personen) {
        const people = document.createElement("span");
        people.className = "pill";
        people.textContent = term.personen;
        meta.appendChild(people);
      }

      titleWrap.append(title, meta);
      top.appendChild(titleWrap);

      if (canManageTerms()) {
        const actions = document.createElement("div");
        actions.className = "form-actions";
        [["edit-term", "Bearbeiten", "secondary"], ["delete-term", "Löschen", "danger"]].forEach(([action, label, style]) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn " + style + " small";
          btn.dataset.action = action;
          btn.dataset.termId = term.id;
          btn.dataset.subjectKey = term.subjectKey;
          btn.textContent = label;
          actions.appendChild(btn);
        });
        top.appendChild(actions);
      }

      card.appendChild(top);
      return card;
    }

    function renderTermList() {
      elements.termList.innerHTML = "";
      const list = visibleTerms();
      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = "<h3>Keine Einträge</h3><p>Für den aktuellen Filter gibt es noch keine Termine.</p>";
        elements.termList.appendChild(empty);
        return;
      }
      list.forEach((term) => elements.termList.appendChild(createTermCard(term)));
    }

    function createUserCard(uid, profile) {
      const card = document.createElement("article");
      card.className = "user-card";

      const top = document.createElement("div");
      top.className = "user-top";
      const titleWrap = document.createElement("div");
      titleWrap.className = "user-title";
      const title = document.createElement("h3");
      title.textContent = profile.name || "Unbenannter Benutzer";

      const meta = document.createElement("div");
      meta.className = "term-meta";
      const email = document.createElement("span");
      email.className = "pill";
      email.textContent = profile.email || "Keine E-Mail";
      meta.appendChild(email);
      const role = document.createElement("span");
      role.className = "pill";
      role.textContent = roleLabel(profile.role);
      meta.appendChild(role);
      const status = document.createElement("span");
      status.className = "status-badge " + (profile.approved ? "type-hu" : "type-test");
      status.textContent = profile.approved ? "Freigeschaltet" : "Wartet";
      meta.appendChild(status);

      titleWrap.append(title, meta);
      top.appendChild(titleWrap);
      card.appendChild(top);

      const controls = document.createElement("div");
      controls.className = "user-controls";
      const select = document.createElement("select");
      select.dataset.userId = uid;
      ["user", "sprecher", "admin"].forEach((roleValue) => {
        const option = document.createElement("option");
        option.value = roleValue;
        option.textContent = roleLabel(roleValue);
        option.selected = profile.role === roleValue;
        select.appendChild(option);
      });
      controls.appendChild(select);

      const save = document.createElement("button");
      save.type = "button";
      save.className = "btn secondary small";
      save.dataset.action = "save-role";
      save.dataset.userId = uid;
      save.textContent = "Rolle speichern";
      controls.appendChild(save);

      if (!profile.approved) {
        const approve = document.createElement("button");
        approve.type = "button";
        approve.className = "btn small";
        approve.dataset.action = "approve-user";
        approve.dataset.userId = uid;
        approve.textContent = "Freischalten";
        controls.appendChild(approve);
      }

      card.appendChild(controls);
      return card;
    }

    function renderAdminPanel() {
      elements.adminPanel.classList.toggle("hidden", !isAdmin());
      elements.userList.innerHTML = "";
      if (!isAdmin()) return;
      const entries = Object.entries(state.users);
      if (!entries.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = "<h3>Noch keine Benutzer</h3><p>Aktuell sind keine Benutzer vorhanden.</p>";
        elements.userList.appendChild(empty);
        return;
      }
      entries.sort((a, b) => {
        if (a[1].approved !== b[1].approved) return a[1].approved ? 1 : -1;
        return (a[1].name || "").localeCompare(b[1].name || "", "de");
      }).forEach(([uid, profile]) => elements.userList.appendChild(createUserCard(uid, profile)));
    }

    function renderTermForm() {
      const visible = canManageTerms();
      elements.termFormPanel.classList.toggle("hidden", !visible);
      elements.jumpToFormBtn.classList.toggle("hidden", !visible);
      if (!visible) return;
      elements.termFormTitle.textContent = state.editingTerm ? "Termin bearbeiten" : "Termin hinzufügen";
      elements.saveTermBtn.textContent = state.editingTerm ? "Änderungen speichern" : "Termin speichern";
      elements.cancelEditBtn.classList.toggle("hidden", !state.editingTerm);
      if (!state.editingTerm) {
        elements.termSubject.value = state.selectedSubjectKey || SUBJECTS[0].key;
      }
    }

    function renderAll() {
      renderHeader();
      renderDayBar();
      renderSubjectList();
      renderContentHeader();
      renderTermList();
      renderTermForm();
      renderAdminPanel();
    }

    function resetTermForm() {
      state.editingTerm = null;
      elements.termForm.reset();
      elements.termDate.value = todayValue();
      elements.termType.value = TERM_TYPES[0];
      elements.termSubject.value = state.selectedSubjectKey || SUBJECTS[0].key;
      renderTermForm();
    }

    function findTerm(subjectKey, termId) {
      return state.terms.find((term) => term.id === termId && term.subjectKey === subjectKey) || null;
    }

    function loadTerm(term) {
      state.editingTerm = term;
      elements.termSubject.value = term.subjectKey;
      elements.termType.value = term.typ;
      elements.termDate.value = term.datum;
      elements.termDescription.value = term.beschreibung;
      elements.termPeople.value = term.personen || "";
      renderTermForm();
      elements.termFormPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function createUserProfile(uid, name, email) {
      const admin = isAdminEmail(email);
      await set(ref(db, "users/" + uid), {
        name,
        email,
        role: admin ? "admin" : "user",
        approved: admin,
        createdAt: Date.now()
      });
      return admin;
    }

    function ensureTermsSubscription() {
      if (state.unsubTerms) return;
      state.unsubTerms = onValue(ref(db, "terms"), (snapshot) => {
        state.terms = normalizeTerms(snapshot.val());
        renderAll();
      }, (error) => toast(readableDbError(error), "error"));
    }

    function ensureUsersSubscription() {
      if (!isAdmin()) {
        if (state.unsubUsers) {
          state.unsubUsers();
          state.unsubUsers = null;
        }
        state.users = {};
        renderAdminPanel();
        return;
      }
      if (state.unsubUsers) return;
      state.unsubUsers = onValue(ref(db, "users"), (snapshot) => {
        state.users = snapshot.val() || {};
        renderAdminPanel();
      }, (error) => toast(readableDbError(error), "error"));
    }

    async function denyAccess(message) {
      setAuthNotice(message, "error", "login");
      await signOut(auth);
    }

    function subscribeProfile(uid) {
      state.unsubProfile = onValue(ref(db, "users/" + uid), async (snapshot) => {
        const profile = snapshot.val();
        if (!profile) {
          if (state.pendingProfileCreation) return;
          await denyAccess("Dein Profil wurde nicht gefunden. Bitte registriere dich erneut.");
          return;
        }
        state.currentProfile = { uid, ...profile };
        if (!profile.approved) {
          if (state.registrationFlow) return;
          await denyAccess("Dein Konto wurde noch nicht freigeschaltet. Bitte warte auf einen Admin.");
          return;
        }
        ensureTermsSubscription();
        ensureUsersSubscription();
        renderAll();
        setScreen("main");
      }, (error) => toast(readableDbError(error), "error"));
    }

    async function handleRegister(event) {
      event.preventDefault();
      clearAuthNotice();
      const name = elements.registerName.value.trim();
      const email = elements.registerEmail.value.trim();
      const password = elements.registerPassword.value;
      const confirm = elements.registerPasswordConfirm.value;
      if (!name || !email || !password || !confirm) {
        setAuthNotice("Bitte fülle alle Registrierungsfelder aus.", "error", "register");
        return;
      }
      if (password !== confirm) {
        setAuthNotice("Die Passwörter stimmen nicht überein.", "error", "register");
        return;
      }
      state.pendingProfileCreation = true;
      state.registrationFlow = true;
      setBusy(elements.registerSubmitBtn, true, "Registriere...");
      try {
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        const isAdmin = await createUserProfile(credential.user.uid, name, email);
        elements.registerForm.reset();
        if (isAdmin) {
          toast("Admin-Konto erkannt und freigeschaltet.", "success");
          switchAuthView("login");
        } else {
          setAuthNotice("Registrierung erfolgreich. Ein Admin muss dein Konto jetzt freischalten.", "success", "login");
          switchAuthView("login");
          await signOut(auth);
        }
      } catch (error) {
        if (auth.currentUser) {
          try { await signOut(auth); } catch {}
        }
        setAuthNotice(readableAuthError(error), "error", "register");
      } finally {
        state.pendingProfileCreation = false;
        state.registrationFlow = false;
        setBusy(elements.registerSubmitBtn, false);
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearAuthNotice();
      const email = elements.loginEmail.value.trim();
      const password = elements.loginPassword.value;
      if (!email || !password) {
        setAuthNotice("Bitte gib E-Mail und Passwort ein.", "error", "login");
        return;
      }
      setBusy(elements.loginSubmitBtn, true, "Prüfe Login...");
      setScreen("loading");
      try {
        await signInWithEmailAndPassword(auth, email, password);
        elements.loginForm.reset();
      } catch (error) {
        setScreen("auth");
        setAuthNotice(readableAuthError(error), "error", "login");
      } finally {
        setBusy(elements.loginSubmitBtn, false);
      }
    }

    async function handleLogout() {
      clearAuthNotice();
      await signOut(auth);
      toast("Du wurdest abgemeldet.", "info");
    }

    async function handleTermSubmit(event) {
      event.preventDefault();
      if (!canManageTerms()) {
        toast("Du hast keine Rechte zum Bearbeiten von Terminen.", "error");
        return;
      }
      const subjectKey = elements.termSubject.value;
      const subject = subjectByKey(subjectKey);
      const typ = elements.termType.value;
      const datum = elements.termDate.value;
      const beschreibung = elements.termDescription.value.trim();
      const personen = elements.termPeople.value.trim();
      if (!subjectKey || !typ || !datum || !beschreibung) {
        toast("Bitte fülle Fach, Typ, Datum und Beschreibung aus.", "error");
        return;
      }
      const payload = { fach: subject.label, typ, datum, beschreibung, personen, updatedAt: Date.now(), updatedBy: state.currentUser.uid };
      setBusy(elements.saveTermBtn, true, state.editingTerm ? "Speichere..." : "Lege an...");
      try {
        if (state.editingTerm) {
          await set(ref(db, "terms/" + subjectKey + "/" + state.editingTerm.id), payload);
          if (subjectKey !== state.editingTerm.subjectKey) {
            await remove(ref(db, "terms/" + state.editingTerm.subjectKey + "/" + state.editingTerm.id));
          }
          toast("Termin wurde aktualisiert.", "success");
        } else {
          const newRef = push(ref(db, "terms/" + subjectKey));
          await set(newRef, { ...payload, createdAt: Date.now(), createdBy: state.currentUser.uid });
          toast("Termin wurde hinzugefügt.", "success");
        }
        resetTermForm();
      } catch (error) {
        toast(readableDbError(error), "error");
      } finally {
        setBusy(elements.saveTermBtn, false);
      }
    }

    async function handleTermActions(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const term = findTerm(button.dataset.subjectKey, button.dataset.termId);
      if (!term) {
        toast("Der ausgewählte Termin konnte nicht gefunden werden.", "error");
        return;
      }
      if (button.dataset.action === "edit-term") {
        loadTerm(term);
        return;
      }
      if (button.dataset.action === "delete-term") {
        if (!window.confirm("Diesen Termin wirklich löschen?")) return;
        setBusy(button, true, "Lösche...");
        try {
          await remove(ref(db, "terms/" + term.subjectKey + "/" + term.id));
          if (state.editingTerm && state.editingTerm.id === term.id) resetTermForm();
          toast("Termin wurde gelöscht.", "success");
        } catch (error) {
          toast(readableDbError(error), "error");
        } finally {
          setBusy(button, false);
        }
      }
    }

    function approvedAdminCount() {
      return Object.values(state.users).filter((user) => user.approved && user.role === "admin").length;
    }

    async function handleUserActions(event) {
      const button = event.target.closest("button[data-action]");
      if (!button || !isAdmin()) return;
      const userId = button.dataset.userId;
      const target = state.users[userId];
      const select = elements.userList.querySelector('select[data-user-id="' + userId + '"]');
      const nextRole = select ? select.value : "user";
      if (!target) {
        toast("Benutzer konnte nicht gefunden werden.", "error");
        return;
      }
      if (button.dataset.action === "save-role" && userId === state.currentUser.uid && target.role === "admin" && nextRole !== "admin" && approvedAdminCount() <= 1) {
        toast("Du kannst dich nicht selbst als letzten Admin entfernen.", "error");
        return;
      }
      setBusy(button, true, button.dataset.action === "approve-user" ? "Schalte frei..." : "Speichere...");
      try {
        if (button.dataset.action === "approve-user") {
          await update(ref(db, "users/" + userId), { approved: true, approvedAt: Date.now(), approvedBy: state.currentUser.uid });
          toast("Benutzer wurde freigeschaltet.", "success");
        }
        if (button.dataset.action === "save-role") {
          await update(ref(db, "users/" + userId), { role: nextRole });
          toast("Rolle wurde gespeichert.", "success");
        }
      } catch (error) {
        toast(readableDbError(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    function handleDayBar(event) {
      const button = event.target.closest("button[data-day]");
      if (!button) return;
      state.filterMode = "day";
      state.selectedDay = button.dataset.day;
      state.selectedSubjectKey = null;
      renderAll();
    }

    function handleSubjectList(event) {
      const button = event.target.closest("button[data-subject-key]");
      if (!button) return;
      state.filterMode = "subject";
      state.selectedSubjectKey = button.dataset.subjectKey;
      renderAll();
    }

    function resetToTodayFilter() {
      state.filterMode = "day";
      state.selectedDay = todayValue();
      state.selectedSubjectKey = null;
      renderAll();
    }

    function resetLoggedOutState() {
      cleanupSubscriptions();
      state.currentUser = null;
      state.currentProfile = null;
      state.terms = [];
      state.users = {};
      state.filterMode = "day";
      state.selectedDay = todayValue();
      state.selectedSubjectKey = null;
      state.pendingProfileCreation = false;
      state.registrationFlow = false;
      resetTermForm();
      renderAll();
    }

    function registerEvents() {
      elements.showLoginBtn.addEventListener("click", () => switchAuthView("login"));
      elements.showRegisterBtn.addEventListener("click", () => switchAuthView("register"));
      elements.loginForm.addEventListener("submit", handleLogin);
      elements.registerForm.addEventListener("submit", handleRegister);
      elements.logoutBtn.addEventListener("click", handleLogout);
      elements.resetFilterBtn.addEventListener("click", resetToTodayFilter);
      elements.showAllSubjectsBtn.addEventListener("click", resetToTodayFilter);
      elements.dayBar.addEventListener("click", handleDayBar);
      elements.subjectList.addEventListener("click", handleSubjectList);
      elements.termForm.addEventListener("submit", handleTermSubmit);
      elements.termList.addEventListener("click", handleTermActions);
      elements.userList.addEventListener("click", handleUserActions);
      elements.cancelEditBtn.addEventListener("click", resetTermForm);
      elements.jumpToFormBtn.addEventListener("click", () => elements.termFormPanel.scrollIntoView({ behavior: "smooth", block: "start" }));
    }

    function initAuth() {
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          resetLoggedOutState();
          setScreen("auth");
          return;
        }
        cleanupSubscriptions();
        state.currentUser = user;
        state.currentProfile = null;
        state.terms = [];
        state.users = {};
        setScreen("loading");
        subscribeProfile(user.uid);
      });
    }

    populateStaticUI();
    registerEvents();
    switchAuthView("login");
    resetTermForm();
    renderAll();
    initAuth();
  </script>
</body>
</html>
